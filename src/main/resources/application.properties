spring.application.name=BookMyShowOct24

# ---------------------------------------------------------------------------
# Database
# ---------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/bmsoct24
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true


# ===========================================================================
# Spring AI — Multi-provider configuration for BookBot
# ---------------------------------------------------------------------------
# Each block below configures ONE LLM provider. Every Spring AI starter on
# the classpath will try to auto-configure its ChatModel bean at startup, so
# every API key / project value MUST exist as an env var (real or dummy)
# otherwise Spring will refuse to start. The `:dummy-...` fallbacks below
# keep the app bootable on a laptop with zero provider credentials set —
# individual calls will still fail until you export a real key, but the
# application context itself will always come up.
#
# Fallback chain (see BookMyShowAgentService): Gemini -> Anthropic -> OpenAI -> Ollama
# ===========================================================================

# ---- 1) PRIMARY provider: Google Gemini via Vertex AI --------------------
# Vertex AI uses Google Application Default Credentials (ADC) — NOT an API key.
# Before running locally:
#   1. Install gcloud CLI
#   2. `gcloud auth application-default login`
#   3. Export VERTEX_AI_PROJECT_ID to the GCP project ID that has Vertex AI enabled.
spring.ai.vertex.ai.gemini.project-id=${VERTEX_AI_PROJECT_ID:dummy-project}
spring.ai.vertex.ai.gemini.location=${VERTEX_AI_LOCATION:us-central1}
spring.ai.vertex.ai.gemini.chat.options.model=gemini-2.0-flash
spring.ai.vertex.ai.gemini.chat.options.temperature=0.2

# ---- 2) FALLBACK #1: Anthropic Claude ------------------------------------
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:dummy-anthropic-key}
spring.ai.anthropic.chat.options.model=claude-sonnet-4-5
spring.ai.anthropic.chat.options.temperature=0.2
spring.ai.anthropic.chat.options.max-tokens=2048

# ---- 3) FALLBACK #2: OpenAI ----------------------------------------------
spring.ai.openai.api-key=${OPENAI_API_KEY:dummy-openai-key}
spring.ai.openai.chat.options.model=gpt-4o
spring.ai.openai.chat.options.temperature=0.2

# ---- 4) LAST-RESORT: Ollama (local model) --------------------------------
# Works out of the box once `ollama pull qwen3.5:9b` + `ollama serve` are running.
# Tool-calling note: pick a 7B+ model. Smaller variants (1.5B / 3B) often emit
# free-text instead of calling a tool, which looks like a harness bug but isn't.
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.options.model=qwen3.5:9b
spring.ai.ollama.chat.options.temperature=0.2


# ===========================================================================
# Resilience4j — automatic failover between the four providers above
# ---------------------------------------------------------------------------
# The `aiModelFailover` instance is referenced by @Retry on
# BookMyShowAgentService.processMessage(...). max-attempts=1 means "try the
# primary exactly once — if it throws a matching exception, immediately
# hand off to the fallbackMethod" (i.e. NO retry delay, just route to the
# next provider in the chain). This is the behaviour we want for user-
# facing chat: we don't want the end user to wait 10s while we retry a
# dead OpenAI endpoint — just answer from Anthropic/Gemini right away.
# ===========================================================================
resilience4j.retry.instances.aiModelFailover.max-attempts=1
resilience4j.retry.instances.aiModelFailover.wait-duration=0s
# One broad catch-all: any Exception from the primary call triggers the fallbackMethod.
# Each of our four providers throws different wrapped types (Vertex AI wraps gRPC errors,
# Anthropic/OpenAI use Spring AI's NonTransientAiException, Ollama raises RestClient
# errors, etc.). Listing a specific class would mean an unmatched failure bubbles up
# raw to the user — we always want the chain to run, so we accept anything.
resilience4j.retry.instances.aiModelFailover.retry-exceptions=java.lang.Exception
